# Knowella Outreach on a GCP VM — app + HTTPS in two containers.
# Run from the repo root:  docker compose -f deploy/docker-compose.yml up -d --build
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: ../.env          # MONGO_URI/MONGO_DB, APOLLO/GOOGLE/TAVILY/CLERK keys
    restart: unless-stopped
    expose:
      - "7860"

  # Caddy terminates HTTPS with an automatic Let's Encrypt cert.
  # Point your domain's A record at this VM, set DOMAIN below (or in the shell).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-outreach.knowella.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
