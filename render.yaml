# Render blueprint — deploys the API (FastAPI) + the web app (static Vite build).
# In the Render dashboard: New → Blueprint → point at this repo. Then fill in the
# env vars marked `sync: false` (secrets) under each service. See DEPLOY.md.
services:
  # --- backend API ---------------------------------------------------------
  - type: web
    name: outreach-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI            # MongoDB Atlas connection string
        sync: false
      - key: APOLLO_API_KEY       # Apollo (leads + sending)
        sync: false
      - key: GOOGLE_API_KEY       # Gemini (drafting)
        sync: false
      - key: TAVILY_API_KEY       # research web search
        sync: false
      - key: CLERK_SECRET_KEY     # Clerk (enables API auth)
        sync: false
      - key: CLERK_PUBLISHABLE_KEY  # used to derive the token issuer
        sync: false
      - key: ALLOWED_ORIGINS      # set to the web app URL, e.g. https://outreach-web.onrender.com
        sync: false
      - key: ALLOWED_EMAIL_DOMAINS  # who may use the app, e.g. knowella.com (else any sign-up gets in)
        sync: false
      - key: ALLOWED_EMAILS         # or list specific emails (comma-separated)
        sync: false

  # --- frontend (static site) ---------------------------------------------
  - type: web
    name: outreach-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: web/dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY  # enables the sign-in wall
        sync: false
      - key: VITE_API_BASE               # the API URL, e.g. https://outreach-api.onrender.com
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
